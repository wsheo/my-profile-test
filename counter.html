<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카운터 앱</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center">
    <div class="bg-white rounded-lg shadow-2xl p-8 w-96">
        <h1 class="text-3xl font-bold text-center text-gray-800 mb-8">카운터</h1>

        <div class="bg-blue-50 rounded-lg p-8 mb-8 text-center">
            <p class="text-gray-600 text-sm mb-2">현재 카운트</p>
            <p class="text-6xl font-bold text-blue-600" id="counter">0</p>
        </div>

        <div class="flex gap-3 mb-4">
            <button class="flex-1 bg-blue-500 hover:bg-blue-600 text-white font-semibold py-3 px-4 rounded-lg transition duration-200 transform hover:scale-105 active:scale-95 text-lg" onclick="decrease()">
                −1
            </button>
            <button class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg transition duration-200 transform hover:scale-105 active:scale-95 text-lg" onclick="increase()">
                +1
            </button>
        </div>

        <button class="w-full bg-red-500 hover:bg-red-600 text-white font-semibold py-3 px-4 rounded-lg transition duration-200 transform hover:scale-105 active:scale-95" onclick="reset()">
            리셋
        </button>
    </div>

    <script>
        let count = 0;

        function updateDisplay() {
            document.getElementById('counter').textContent = count;
        }

        function increase() {
            count++;
            updateDisplay();
        }

        function decrease() {
            count--;
            updateDisplay();
        }

        function reset() {
            count = 0;
            updateDisplay();
        }
    </script>
</body>
</html>
